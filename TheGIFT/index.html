<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            background-image: url('IMG_5872.png'); 
            background-size: cover; background-position: center;
            background-repeat: no-repeat; color: #FFFFE0; font-family: sans-serif;
            transition: background-image 0.1s; /* Chuyển cảnh cực nhanh */
        }
        .container { text-align: center; background: rgba(0,0,0,0.4); padding: 50px; border-radius: 20px; }
        .glitch-flash { animation: flash 0.2s; }
        @keyframes flash { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="container" id="mainBox">
        <h1>THE GIFT</h1>
        <button onclick="glitchEffect()" style="padding:10px 20px; cursor:pointer;">enter hub</button>
    </div>

    <script>
        function glitchEffect() {
            const body = document.body;
            // 1. Chớp đen 1 cái
            body.style.backgroundColor = "black";
            // 2. Đổi sang ảnh cảnh 2 (IMG_5885.png)
            body.style.backgroundImage = "url('IMG_5885.png')";
            // 3. Ẩn menu cũ đi
            document.getElementById('mainBox').style.display = 'none';
        }
    </script>
</body>
</html>
