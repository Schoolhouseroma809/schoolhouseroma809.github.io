<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: black; color: white; font-family: monospace; }
        h1 { font-size: 3em; color: #ff0055; margin-bottom: 10px; }
        #welcome { font-size: 1.2em; margin-bottom: 20px; }
        button { background: transparent; border: 1px solid white; color: white; padding: 10px 20px; cursor: pointer; font-size: 1em; }
    </style>
</head>
<body>
    <h1 id="title"></h1>
    <p id="welcome"></p>
    <button onclick="window.location.href='gift.html'">NEXT</button>

    <script>
        function typeText(text, id, speed) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    document.getElementById(id).innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }
        typeText("THE GIFT", "title", 150);
        setTimeout(() => typeText("welcome, the exception.", "welcome", 100), 1500);
    </script>
</body>
</html>
